<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CRM | Вход</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container { height: 100vh; display: flex; align-items: center; justify-content: center; background: #0f172a; }
        .auth-card { background: white; padding: 40px; border-radius: 12px; width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-login { width: 100%; background: #4f46e5; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        /* Стили для дополнительных ссылок */
        .auth-footer { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; text-align: center; }
        .auth-link { color: #64748b; text-decoration: none; font-size: 13px; transition: color 0.2s; }
        .auth-link:hover { color: #4f46e5; text-decoration: underline; }
        .divider { height: 1px; background: #e2e8f0; margin: 10px 0; }
    </style>
</head>
<body class="auth-container">
    <div class="auth-card">
        <h2 style="margin-top:0; text-align: center; color: #1e293b;">Вход в систему</h2>
        
        <input type="text" id="l" placeholder="Логин">
        <input type="password" id="p" placeholder="Пароль">
        
        <button class="btn-login" onclick="login()">Войти</button>
        
        
    </div>

    <script>
        async function login() {
            const loginVal = document.getElementById('l').value;
            const passVal = document.getElementById('p').value;
            
            const res = await fetch('login.php', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({login: loginVal, password: passVal})
            });
            const data = await res.json();
            
            if(data.status === 'success') {
                window.location.href = 'index.php';
            } else {
                alert(data.message);
            }
        }
    </script>
</body>
</html>
